<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Elite Sports Management — Athlete Representation</title>
<meta name="description" content="Elite Sports Management — baseball and softball athlete representation and development across college recruiting, independent pro ball and Europe. Founded by professional baseball player Samuele Bruno (Hastings College NAIA, scholarship athlete, class of 2027). Browse the roster, upcoming events and individual athlete profiles." />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<link rel="shortcut icon" href="icons/icon-192.png" />
<meta name="theme-color" content="#081a33" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ESM" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#081a33;--navy-2:#06142a;--navy-3:#0d2547;--gold:#d9b154;--gold-soft:#e7c878;--teal:#3a9aa6;--teal-soft:#5fb8c2;--ink:#eaf0fa;--muted:#9fb1cc;--line:rgba(217,177,84,.22);--card:#0c2143}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--navy-2);color:var(--ink);line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .display{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.01em;line-height:.92;text-transform:uppercase}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  .bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none}
  .bg-fx::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 500px at 78% -10%,rgba(217,177,84,.16),transparent 60%),radial-gradient(800px 600px at 8% 110%,rgba(20,70,140,.30),transparent 55%),linear-gradient(180deg,var(--navy),var(--navy-2))}
  .bg-fx::after{content:"";position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(135deg,#fff 0 1px,transparent 1px 9px)}

  header.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);background:rgba(6,20,42,.72);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:64px;gap:14px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800}
  .logo{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);display:grid;place-items:center;background:radial-gradient(circle at 50% 35%,#10305c,#06142a);font-family:'Anton';font-size:13px;color:var(--gold);position:relative}
  .logo span{position:absolute;top:-3px;font-size:9px}
  .logo-img{height:40px;width:auto;display:block}
  .foot-logo{height:64px;width:auto;display:block;margin-bottom:8px}
  .brand b{font-size:14px}.brand small{display:block;font-size:8.5px;letter-spacing:.3em;color:var(--gold-soft);font-weight:700}
  .nav-right{display:flex;align-items:center;gap:18px}
  .nav-links{display:flex;gap:22px;font-size:14px;font-weight:600}
  .nav-links a{color:var(--muted);transition:.2s}.nav-links a:hover{color:var(--gold-soft)}
  .lang{display:flex;gap:2px;border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{background:transparent;border:0;color:var(--muted);font-weight:700;font-size:12px;padding:5px 9px;border-radius:999px;cursor:pointer}
  .lang button.on{background:var(--gold);color:#05101f}
  .nav-cta{border:1px solid var(--gold);color:var(--gold-soft);padding:9px 15px;border-radius:999px;font-size:13px;font-weight:700;transition:.2s;white-space:nowrap}
  .nav-cta:hover{background:var(--gold);color:#05101f}
  @media(max-width:860px){.nav-links{display:none}}

  .hero{position:relative;z-index:1;padding:58px 0 46px}
  .eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--gold-soft);border:1px solid var(--line);padding:7px 14px;border-radius:999px;margin-bottom:26px}
  .eyebrow i{width:6px;height:6px;border-radius:50%;background:var(--teal-soft);box-shadow:0 0 12px var(--teal)}
  .hero h1{font-size:clamp(40px,8vw,86px);max-width:14ch}.hero h1 em{color:var(--gold);font-style:normal}
  .hero p.lead{margin-top:24px;max-width:56ch;font-size:clamp(16px,2.2vw,20px);color:var(--muted)}
  .hero-btns{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap}
  .btn{padding:14px 26px;border-radius:999px;font-weight:700;font-size:15px;transition:.22s;cursor:pointer;border:0;display:inline-block}
  .btn-gold{background:var(--gold);color:#05101f}.btn-gold:hover{background:var(--gold-soft);transform:translateY(-2px)}
  .btn-ghost{border:1px solid var(--line);color:var(--ink)}.btn-ghost:hover{border-color:var(--gold);color:var(--gold-soft)}

  .stats{position:relative;z-index:1;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(8,26,51,.5)}
  .stats-in{display:grid;grid-template-columns:repeat(3,1fr)}
  .stat{padding:30px 18px;text-align:center;border-right:1px solid var(--line)}.stat:last-child{border-right:0}
  .stat b{font-family:'Anton';font-size:clamp(34px,6vw,56px);color:var(--gold);display:block;line-height:1}
  .stat span{font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}

  section{position:relative;z-index:1}.sec{padding:64px 0}
  .sec-head{margin-bottom:42px}
  .kicker{font-size:12px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--teal-soft)}
  .sec-head h2{font-size:clamp(32px,5.5vw,58px);margin-top:12px;max-width:20ch}
  .sec-head p{color:var(--muted);max-width:62ch;margin-top:14px;font-size:16.5px}

  .do-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px}
  .do{padding:24px 20px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--card),rgba(8,26,51,.4));transition:.25s}
  .do:hover{transform:translateY(-4px);border-color:var(--gold)}
  .do .ic{font-size:22px;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;background:rgba(217,177,84,.12);border:1px solid var(--line);margin-bottom:15px}
  .do h3{font-size:17px;margin-bottom:7px}.do p{color:var(--muted);font-size:14px}
  .svc-pay{display:inline-block;margin-top:12px;font-size:12.5px;font-weight:700;color:var(--gold);letter-spacing:.03em}
  .svc-pay:hover{color:var(--gold-soft)}

  .founder{display:grid;grid-template-columns:200px 1fr;gap:34px;align-items:center;border:1px solid var(--line);border-radius:20px;padding:34px;background:radial-gradient(circle at 12% 20%,rgba(217,177,84,.10),transparent 55%),linear-gradient(180deg,var(--card),var(--navy-2))}
  @media(max-width:640px){.founder{grid-template-columns:1fr;text-align:center}}
  .founder .mono{font-family:'Anton';font-size:70px;color:var(--gold);width:180px;height:180px;border-radius:50%;border:2px solid rgba(217,177,84,.4);display:grid;place-items:center;background:rgba(6,20,42,.5);margin:0 auto;background-size:cover;background-position:center}
  .founder h3{font-size:clamp(26px,5vw,40px)}
  .founder .role{color:var(--gold-soft);font-weight:700;margin-top:4px}
  .founder p{color:var(--muted);margin-top:14px;font-size:16px;max-width:62ch}
  .creds{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
  @media(max-width:640px){.creds{justify-content:center}}
  .cred{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line);color:#cdd9ec;background:rgba(8,26,51,.5)}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px}
  .chip{padding:9px 17px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);font-weight:700;font-size:13.5px;cursor:pointer;transition:.18s}
  .chip:hover{color:var(--ink)}.chip.active{background:var(--gold);color:#05101f;border-color:var(--gold)}
  .roster{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:900px){.roster{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.roster{grid-template-columns:1fr}}
  .pcard{position:relative;border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;background:linear-gradient(180deg,var(--card),var(--navy-2));transition:.25s;text-align:left;width:100%}
  .pcard:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 18px 40px -20px rgba(0,0,0,.8)}
  .pcard .top{position:relative;height:150px;display:grid;place-items:center;background:radial-gradient(circle at 50% 22%,#16386a,#0a1f3c);overflow:hidden;background-size:cover;background-position:center}
  .pcard .top::after{content:"";position:absolute;inset:0;opacity:.07;background-image:repeating-linear-gradient(135deg,#fff 0 1px,transparent 1px 8px)}
  .mono{font-family:'Anton';font-size:46px;color:var(--gold);z-index:1;width:96px;height:96px;border-radius:50%;border:2px solid rgba(217,177,84,.4);display:grid;place-items:center;background:rgba(6,20,42,.45)}
  .tier{position:absolute;top:12px;right:12px;font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:999px;background:rgba(6,20,42,.7);border:1px solid var(--line);color:var(--gold-soft);z-index:2}
  .flag{position:absolute;top:12px;left:12px;font-size:19px;z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
  .pcard .body{padding:17px 18px 20px}
  .pcard .body h3{font-size:19px;line-height:1.15}
  .pcard .pos{color:var(--gold-soft);font-size:13px;font-weight:700;margin-top:3px}
  .pcard .team{color:var(--muted);font-size:13px;margin-top:11px;display:flex;align-items:center;gap:7px}
  .pcard .team::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--teal-soft);flex:none}
  .pcard .view{margin-top:14px;font-size:12.5px;font-weight:700;color:var(--gold);letter-spacing:.04em}

  /* events */
  .ev-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .ev-card{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:linear-gradient(180deg,var(--card),var(--navy-2));transition:.25s}
  .ev-card:hover{transform:translateY(-4px);border-color:var(--gold)}
  .ev-img{height:130px;background:radial-gradient(circle at 70% 20%,rgba(217,177,84,.25),#0a1f3c);display:grid;place-items:center;font-size:38px;background-size:cover;background-position:center;position:relative}
  .ev-status{position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:999px;border:1px solid var(--line)}
  .ev-status.up{background:var(--gold);color:#05101f;border-color:var(--gold)}
  .ev-status.past{background:rgba(6,20,42,.7);color:var(--muted)}
  .ev-body{padding:18px}
  .ev-body h3{font-size:19px}
  .ev-meta{color:var(--gold-soft);font-size:13px;font-weight:700;margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
  .ev-body p{color:var(--muted);font-size:14px;margin-top:10px}
  .ev-body .ev-tags{color:var(--teal-soft);font-size:12.5px;margin-top:8px;line-height:1.5}
  .ev-body .ev-link{display:inline-block;margin-top:12px;font-size:12.5px;font-weight:700;color:var(--gold);letter-spacing:.04em}

  /* testimonials */
  .testi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
  .testi{border:1px solid var(--line);border-radius:18px;padding:26px 24px;background:linear-gradient(180deg,var(--card),var(--navy-2));position:relative}
  .testi .q{font-size:40px;font-family:'Anton';color:rgba(217,177,84,.4);line-height:.6}
  .testi p{font-size:16px;color:#d6e1f2;margin:8px 0 18px}
  .testi .who{display:flex;align-items:center;gap:12px}
  .testi .av{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(217,177,84,.4);display:grid;place-items:center;font-family:'Anton';color:var(--gold);font-size:16px;background:rgba(6,20,42,.5)}
  .testi .nm{font-weight:700;font-size:14.5px}.testi .rl{color:var(--muted);font-size:12.5px}

  .join{border:1px solid var(--line);border-radius:20px;padding:34px;background:linear-gradient(180deg,var(--card),var(--navy-2))}
  .join .tagline{font-family:'Anton';text-transform:uppercase;color:var(--gold);font-size:clamp(18px,3vw,26px);margin-bottom:24px;letter-spacing:.02em}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
  .field label{font-size:13px;font-weight:700;color:var(--gold-soft);letter-spacing:.02em}
  .field input,.field select,.field textarea{background:rgba(6,20,42,.6);border:1px solid var(--line);border-radius:11px;padding:13px 14px;color:var(--ink);font-family:inherit;font-size:15px;outline:none;transition:.18s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
  .field textarea{resize:vertical;min-height:90px}.field select{appearance:none;cursor:pointer}
  .form-msg{display:none;margin-top:14px;padding:14px 16px;border-radius:12px;background:rgba(217,177,84,.12);border:1px solid var(--gold);color:var(--gold-soft);font-weight:600}
  .form-msg.show{display:block}

  .band{position:relative;z-index:1;margin:30px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:linear-gradient(120deg,rgba(217,177,84,.10),transparent)}
  .band-in{padding:58px 0;text-align:center}.band h2{font-size:clamp(28px,5vw,50px)}
  .band p{color:var(--muted);margin:14px auto 26px;max-width:52ch}

  footer{position:relative;z-index:1;border-top:1px solid var(--line);padding:46px 0 70px}
  .foot{display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;align-items:flex-start}
  .foot .muted{color:var(--muted);font-size:13.5px;margin-top:14px}
  .foot-links{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
  @media(max-width:560px){.foot-links{align-items:flex-start}}
  .pill{display:inline-flex;align-items:center;gap:9px;color:var(--gold-soft);font-weight:700;border:1px solid var(--line);padding:10px 16px;border-radius:999px;transition:.2s}
  .pill:hover{border-color:var(--gold);background:rgba(217,177,84,.08)}

  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center}
  .modal.open{display:flex}
  .modal .scrim{position:absolute;inset:0;background:rgba(3,10,22,.78);backdrop-filter:blur(4px)}
  .sheet{position:relative;z-index:2;width:100%;max-width:680px;max-height:90vh;overflow:auto;background:linear-gradient(180deg,var(--navy-3),var(--navy-2));border:1px solid var(--line);border-radius:22px 22px 0 0;animation:rise .3s ease}
  @media(min-width:700px){.modal{align-items:center}.sheet{border-radius:22px}}
  @keyframes rise{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .sh-top{padding:30px 28px;display:flex;gap:20px;align-items:center;border-bottom:1px solid var(--line);background:radial-gradient(circle at 80% 0%,rgba(217,177,84,.12),transparent 60%)}
  .sh-mono{font-family:'Anton';font-size:40px;color:var(--gold);width:88px;height:88px;flex:none;border-radius:50%;border:2px solid rgba(217,177,84,.4);display:grid;place-items:center;background:rgba(6,20,42,.5);background-size:cover;background-position:center}
  .sheet h3{font-size:clamp(24px,5vw,34px)}
  .sh-pos{color:var(--gold-soft);font-weight:700;margin-top:4px}.sh-meta{color:var(--muted);font-size:14px;margin-top:8px}
  .sh-body{padding:26px 28px 34px}.sh-body p.bio{font-size:16px;color:#d6e1f2;margin-bottom:24px}
  .sh-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
  .sh-stat{flex:1;min-width:120px;border:1px solid var(--line);border-radius:13px;padding:14px 16px;background:rgba(8,26,51,.5)}
  .sh-stat b{font-family:'Anton';font-size:22px;color:var(--gold);display:block;line-height:1.1}
  .sh-stat span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .sh-label{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;margin-bottom:12px}
  .team-chips{display:flex;gap:9px;flex-wrap:wrap}
  .sh-contact{margin-top:28px;padding-top:24px;border-top:1px solid var(--line)}
  .sh-contact-p{color:var(--muted);font-size:14px;margin:6px 0 16px}
  .team-chip{font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid var(--line);color:#cdd9ec;background:rgba(8,26,51,.5)}
  .close{position:absolute;top:16px;right:16px;z-index:3;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:rgba(6,20,42,.7);color:var(--ink);font-size:18px;cursor:pointer;display:grid;place-items:center}
  .close:hover{border-color:var(--gold);color:var(--gold)}

  .install{position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;justify-content:center;padding:0 16px 16px}
  .install.show{display:flex}
  .install .box{display:flex;align-items:center;gap:14px;background:rgba(12,33,67,.96);border:1px solid var(--gold);border-radius:14px;padding:12px 14px;backdrop-filter:blur(8px);max-width:520px;width:100%}
  .install .box b{font-size:14px}.install .box span{font-size:12.5px;color:var(--muted);display:block}
  .install button{margin-left:auto;border:0;background:var(--gold);color:#05101f;font-weight:700;padding:9px 14px;border-radius:999px;cursor:pointer}
  .install .x{margin-left:8px;background:transparent;color:var(--muted);border:1px solid var(--line)}

  /* Footer link through to the admin panel (/admin/) */
  .foot-admin{display:inline-block;margin-top:12px;font-size:12px;color:var(--muted);opacity:.6;cursor:pointer;background:none;border:0;font-family:inherit;text-decoration:none}
  .foot-admin:hover{opacity:1;color:var(--gold-soft)}

  /* form error state (applications) */
  .form-msg.err{background:rgba(224,93,93,.12);border-color:#e05d5d;color:#ffb4b4}

  /* ===== mobile / PWA polish ===== */
  *{-webkit-tap-highlight-color:transparent}
  .install{padding-bottom:calc(16px + env(safe-area-inset-bottom))}      /* clear the iOS home indicator */
  footer{padding-bottom:calc(70px + env(safe-area-inset-bottom))}
  @media(max-width:560px){
    .wrap{padding:0 16px}
    /* 16px form controls stop iOS from auto-zooming on focus */
    .field input,.field select,.field textarea{font-size:16px}
  }
</style>
</head>
<body>
<div class="bg-fx"></div>

<header class="nav"><div class="wrap nav-in">
  <a class="brand" href="#top"><img class="logo-img" src="logo.png" alt="Elite Sports Management" /></a>
  <div class="nav-right">
    <nav class="nav-links">
      <a href="#about" data-i18n="nav_about"></a>
      <a href="#who" data-i18n="nav_who"></a>
      <a href="#roster" data-i18n="nav_roster"></a>
      <a href="#events" data-i18n="nav_events"></a>
      <a href="#join" data-i18n="nav_join"></a>
    </nav>
    <div class="lang" id="lang"><button data-l="en" class="on">EN</button><button data-l="es">ES</button><button data-l="it">IT</button></div>
    <a class="nav-cta" href="#join" data-i18n="nav_cta"></a>
  </div>
</div></header>

<a id="top"></a>
<section class="hero"><div class="wrap">
  <span class="eyebrow"><i></i> <span data-i18n="hero_eyebrow"></span></span>
  <h1 class="display" data-i18n-html="hero_h1"></h1>
  <p class="lead" data-i18n="hero_lead"></p>
  <div class="hero-btns">
    <a class="btn btn-gold" href="#roster" data-i18n="hero_btn1"></a>
    <a class="btn btn-ghost" href="#join" data-i18n="hero_btn2"></a>
  </div>
</div></section>

<div class="stats"><div class="wrap stats-in">
  <div class="stat"><b id="statAthletes">17</b><span data-i18n="stat1"></span></div>
  <div class="stat"><b id="statCountries">6</b><span data-i18n="stat2"></span></div>
  <div class="stat"><b>6</b><span data-i18n="stat3"></span></div>
</div></div>

<section class="sec" id="about"><div class="wrap">

let lang="en", active="All", activeSport="All", SB=null;

const initials=n=>n.replace(/[^A-Za-zÀ-ÿ ]/g,"").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase();
const t=k=>(T[lang][k]??k);
const groupKey=g=>({Pitcher:"pitcher",Catcher:"catcher",Infielder:"infielder","Two-Way":"twoway"}[g]||"infielder");
const slugify=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const bgImg=u=>u?`background-image:url('${u}')`:"";

function applyI18n(){
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll("[data-i18n-html]").forEach(el=>el.innerHTML=t(el.dataset.i18nHtml));
  document.querySelectorAll("#lang button").forEach(b=>b.classList.toggle("on",b.dataset.l===lang));
}
function setLang(l){lang=l;applyI18n();renderSportFilters();renderFilters();renderRoster();renderEvents();renderTesti();}

const SPORT_FILTERS=["All","Baseball","Softball"];
function renderSportFilters(){
  const f=document.getElementById("sportFilters");
  f.innerHTML=SPORT_FILTERS.map(x=>`<button class="chip ${x===activeSport?'active':''}" data-sf="${x}">${x==="All"?t("filter_all"):x}</button>`).join("");
  f.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{activeSport=c.dataset.sf;active="All";renderFilters();renderSportFilters();renderRoster();});
}
const FILTERS=["All","Pitcher","Catcher","Infielder","Two-Way"];
function renderFilters(){
  const f=document.getElementById("filters");
  f.innerHTML=FILTERS.map(x=>`<button class="chip ${x===active?'active':''}" data-f="${x}">${t("filter_"+(x==="All"?"all":groupKey(x)))}</button>`).join("");
  f.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{active=c.dataset.f;renderFilters();renderRoster();});
}
function renderRoster(){
  let list=activeSport==="All"?PLAYERS:PLAYERS.filter(p=>(p.sport||"Baseball")===activeSport);
  list=active==="All"?list:list.filter(p=>p.group===active);
  document.getElementById("rosterList").innerHTML=list.map(p=>{
    const hasPage=STATIC_PLAYER_PAGES.has(p.slug);
    const tag=hasPage?"a":"button";
    const linkAttr=hasPage?`href="players/${p.slug}.html"`:`data-slug="${p.slug}"`;
    return `
    <${tag} class="pcard" ${linkAttr}>
      <div class="top" style="${bgImg(p.image)}"><span class="flag">${p.flag||"🌎"}${p.heritage?(" "+p.heritage):""}</span>
        ${p.tier?`<span class="tier">${p.tier}</span>`:""}${p.image?"":`<span class="mono">${initials(p.name)}</span>`}</div>
      <div class="body"><h3 class="display">${p.name}</h3><div class="pos">${p.position}</div>
        ${p.teams&&p.teams[0]?`<div class="team">${p.teams[0]}</div>`:""}<div class="view">${t("card_view")}</div></div>
    </${tag}>`;
  }).join("");
  document.querySelectorAll(".pcard[data-slug]").forEach(c=>c.onclick=()=>openModal(c.dataset.slug));
  document.getElementById("statAthletes").textContent=PLAYERS.length;
  document.getElementById("statCountries").textContent=new Set(PLAYERS.map(p=>p.country).filter(Boolean)).size;
}
function fmtDate(d){try{return new Date(d+"T00:00").toLocaleDateString(lang,{day:"numeric",month:"short",year:"numeric"})}catch(e){return d}}
function renderEvents(){
  const order={upcoming:0,past:1};
  const list=[...EVENTS].sort((a,b)=>(order[a.status]-order[b.status])||a.date.localeCompare(b.date));
  document.getElementById("eventsList").innerHTML=list.map(e=>`
    <div class="ev-card"><div class="ev-img" style="${bgImg(e.image)}">
      <span class="ev-status ${e.status==='upcoming'?'up':'past'}">${e.status==='upcoming'?t("ev_upcoming"):t("ev_past")}</span>
      ${e.image?"":(e.icon||"⚾")}</div>
      <div class="ev-body"><h3 class="display">${e.title}</h3>
        <div class="ev-meta"><span>📅 ${fmtDate(e.date)}</span><span>📍 ${e.loc}</span></div>
        <p>${e.blurb}</p>
        ${e.tags?`<div class="ev-tags">${e.tags}</div>`:""}
        ${e.email?`<a class="ev-link" href="mailto:${e.email}">${t("ev_register")} \u2192</a>`:""}
        </div></div>`).join("");
}
function renderTesti(){
  document.getElementById("testiList").innerHTML=TESTIMONIALS.map(x=>`
    <div class="testi"><div class="q">“</div><p>${x.q}</p>
      <div class="who"><div class="av">${initials(x.n)}</div><div><div class="nm">${x.n}</div><div class="rl">${x.r}</div></div></div></div>`).join("");
}
function openModal(slug){
  const p=PLAYERS.find(x=>x.slug===slug);if(!p)return;
  const meta=[p.born?("Born "+p.born):null,p.birthplace,p.bats?("Bats "+p.bats):null].filter(Boolean).join("  ·  ");
  document.getElementById("sheetContent").innerHTML=`
    <div class="sh-top"><span class="sh-mono" style="${bgImg(p.image)}">${p.image?"":initials(p.name)}</span>
      <div><h3 class="display">${p.name} <span style="font-size:.6em">${p.flag||""}${p.heritage||""}</span></h3>
      <div class="sh-pos">${p.position}</div><div class="sh-meta">${meta}</div></div></div>
    <div class="sh-body"><p class="bio">${p.bio||""}</p>
      ${p.stats&&p.stats.length?`<div class="sh-label">${t("modal_highlights")}</div><div class="sh-stats">${p.stats.map(s=>`<div class="sh-stat"><b>${s.value}</b><span>${s.label}</span></div>`).join("")}</div>`:""}
      ${p.teams&&p.teams.length?`<div class="sh-label">${t("modal_teams")}</div><div class="team-chips">${p.teams.map(x=>`<span class="team-chip">${x}</span>`).join("")}</div>`:""}
      <div class="sh-contact">
        <div class="sh-label">${t("modal_contact_h")}</div>
        <p class="sh-contact-p">${t("modal_contact_p")}</p>
        <a class="btn btn-gold" href="${CONTACT_PAYPAL_URL}" target="_blank" rel="noopener">${t("modal_contact_btn")}</a>
      </div>
    </div>`;
  document.getElementById("modal").classList.add("open");document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("modal").classList.remove("open");document.body.style.overflow="";}
document.querySelectorAll("[data-close]").forEach(e=>e.onclick=closeModal);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
document.getElementById("lang").querySelectorAll("button").forEach(b=>b.onclick=()=>setLang(b.dataset.l));
document.getElementById("yr").textContent=new Date().getFullYear();

const form=document.getElementById("applyForm");
form.addEventListener("submit",async e=>{
  e.preventDefault();
  const fd=new FormData(form);
  const name=(fd.get("name")||"").trim();
  if(!name){form.querySelector("[name=name]").focus();return;}
  const role=fd.get("position")||"Infielder";   // Pitcher | Catcher | Infielder | Two-Way
  const sport=fd.get("sport")||"Baseball";
  const country=(fd.get("country")||"").trim();
  const btn=form.querySelector("button[type=submit]");
  const msg=document.getElementById("formMsg");
  msg.classList.remove("show","err");

  // Applications require the live database; without it we can't save them.
  if(!SB){msg.textContent=t("f_error");msg.classList.add("show","err");msg.scrollIntoView({behavior:"smooth",block:"center"});return;}

  btn.disabled=true;
  // Saved as `pending` so an admin reviews it before it appears on the public roster.
  const {error}=await SB.from("players").insert({
    slug:slugify(name)+"-"+Date.now().toString(36),
    name,"group":role,position:role,sport,country,flag:FLAGS[country]||"🌎",tier:"New",
    bio:(fd.get("why")||"").trim()||"—",teams:[],stats:[],
    age:fd.get("age"),phone:fd.get("phone"),email:fd.get("email"),
    instagram:fd.get("ig"),applying_for:fd.get("applying"),message:fd.get("other"),
    status:"pending",
  });
  btn.disabled=false;
  if(error){console.error("Application failed",error);msg.textContent=t("f_error");msg.classList.add("show","err");msg.scrollIntoView({behavior:"smooth",block:"center"});return;}
  form.reset();
  msg.textContent=t("f_success");msg.classList.add("show");
  msg.scrollIntoView({behavior:"smooth",block:"center"});
});

/* install prompt */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;document.getElementById("install").classList.add("show");});
document.getElementById("installBtn").onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById("install").classList.remove("show");}};
document.getElementById("installX").onclick=()=>document.getElementById("install").classList.remove("show");

async function boot(){
  if(SUPABASE_URL&&SUPABASE_ANON_KEY){
    try{const {createClient}=await import("https://esm.sh/@supabase/supabase-js@2");
      SB=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
      // Only approved players are publicly readable (enforced by RLS too).
      const {data,error}=await SB.from("players").select("*").eq("status","approved").order("sort_order");
      if(error)throw error;
      // Supabase stores the photo in `image_url`; the renderer reads `image`.
      if(data&&data.length)PLAYERS=data.map(p=>({...p,image:p.image_url||p.image||null}));
    }catch(err){console.warn("Supabase load failed; using embedded roster.",err);}
  }
  applyI18n();renderSportFilters();renderFilters();renderRoster();renderEvents();renderTesti();
}
boot();
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}
